<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Yan's Foodhouz POS</title>
<meta name="theme-color" content="#1f2937" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#1f2937; --ink-soft:#475569; --muted:#94a3b8;
  --accent:#2563eb; --accent-dark:#1d4ed8;
  --bg:#f4f5f7; --paper:#ffffff; --line:#e3e6ea;
  --warn:#dc2626; --ok:#16a34a; --amber:#d97706;
  font-family: -apple-system, system-ui, 'Inter', sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);}
h1,h2,h3{margin:0;font-weight:700;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
svg.ic{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;}

/* ===== Login screen ===== */
#loginScreen{position:fixed;inset:0;background:var(--ink);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
#loginScreen.hide{display:none;}
.login-card{background:var(--paper);border-radius:12px;padding:28px 24px;max-width:340px;width:100%;text-align:center;}
.login-card .logo{width:44px;height:44px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-weight:700;font-size:18px;}
.login-card h1{font-size:19px;color:var(--ink);}
.login-card p{font-size:12.5px;color:var(--muted);margin:4px 0 18px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.role-tile{border:1.5px solid var(--line);background:var(--paper);border-radius:10px;padding:16px 8px;color:var(--ink-soft);}
.role-tile.selected{border-color:var(--accent);background:#eff4ff;color:var(--accent-dark);}
.role-tile svg{display:block;margin:0 auto 4px;}
.role-tile .nm{font-weight:700;font-size:13px;}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh;}
.sidebar{width:204px;flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:30;}
.sidebar .brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar .brand .logo{width:30px;height:30px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.sidebar .brand h1{font-size:14.5px;line-height:1.25;}
.sidebar .brand small{display:block;font-size:9px;opacity:.65;letter-spacing:1px;text-transform:uppercase;}
.sidebar nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.sidebar nav button{display:flex;align-items:center;gap:10px;background:none;border:none;color:rgba(255,255,255,.72);padding:10px 12px;border-radius:7px;font-size:13px;font-weight:600;text-align:left;}
.sidebar nav button.active{background:rgba(255,255,255,.12);color:#fff;}
.sidebar .userbox{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11.5px;}
.sidebar .userbox .who{font-weight:700;font-size:13px;margin-bottom:1px;}
.sidebar .userbox .role{opacity:.65;text-transform:uppercase;font-size:9.5px;letter-spacing:.5px;}
.sidebar .userbox button{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(255,255,255,.25);color:#fff;font-size:11px;padding:6px 8px;border-radius:6px;margin-top:8px;width:100%;justify-content:center;}
.sidebar .clock{padding:10px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;opacity:.8;}
.sidebar .clock .t{font-size:15px;font-weight:700;}

.content{flex:1;margin-left:204px;padding:18px 22px 90px;min-width:0;}
.content-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.content-head h2{font-size:19px;display:flex;align-items:center;gap:8px;}

.subtabs{display:flex;gap:5px;margin-bottom:16px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:4px;}
.subtabs button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:none;padding:9px 6px;border-radius:7px;font-size:12px;font-weight:700;color:var(--muted);}
.subtabs button.active{background:var(--accent);color:#fff;}
.subpanel{display:none;}
.subpanel.active{display:block;}

.date-nav{display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 8px;}
.date-nav button{background:none;border:none;font-size:13px;color:var(--ink);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.date-nav button:active{background:var(--bg);}
.date-nav .lbl{font-size:12.5px;font-weight:700;min-width:96px;text-align:center;}
.date-range{display:flex;align-items:center;gap:6px;}
.date-range input[type=date]{width:auto;margin-top:0;padding:6px 8px;font-size:12px;}

.search-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.search-row input[type=text]{flex:1;margin-top:0;}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.grid-row{display:grid;gap:12px;}
.cols-2{grid-template-columns:repeat(2,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}

.card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
.card h3{font-size:13.5px;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:6px;}

.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.tile-grid.cols3{grid-template-columns:repeat(3,1fr);}
.tile{border:1.5px solid var(--line);background:var(--paper);border-radius:8px;padding:10px;text-align:left;color:var(--ink-soft);}
.tile.selected{border-color:var(--accent);background:#eff4ff;color:var(--accent-dark);}
.tile .nm{font-weight:700;font-size:13px;display:block;}
.tile .pr{font-size:11.5px;color:var(--accent);font-weight:600;}

/* Order builder: two columns */
.order-builder{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;}
.order-right{position:sticky;top:18px;}

.cart-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.cart-row .nm{flex:1;}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--bg);font-weight:700;}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:10px;}

select,input[type=text],input[type=number],input[type=date]{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:var(--paper);font-size:13px;margin-top:4px;color:var(--ink);
}
label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.3px;}
.field{margin-bottom:10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;text-align:center;padding:11px;border-radius:8px;border:none;font-weight:700;font-size:13.5px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{background:var(--accent-dark);}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--ink);}
.btn-danger{background:none;color:var(--warn);border:1px solid #f3c2c2;}
.btn-sm{padding:7px 10px;font-size:12px;width:auto;display:inline-flex;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.3px;}
.b-dinein{background:#e8f3ea;color:var(--ok);}
.b-pickup{background:#fdf1e1;color:var(--amber);}
.b-delivery{background:#e8eefd;color:var(--accent);}
.b-paid{background:#e8f3ea;color:var(--ok);}
.b-pending{background:#fdf1e1;color:var(--amber);}
.b-queued{background:#fdf1e1;color:var(--amber);}
.b-served{background:#e8f3ea;color:var(--ok);}
.b-accepted{background:#e8eefd;color:var(--accent);}

.order-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.order-card .items{font-size:12.5px;color:var(--ink-soft);margin:6px 0;}
.order-card .meta{font-size:11px;color:var(--muted);}
.order-card .total{font-weight:700;font-size:14px;}
.order-card .actions{margin-top:10px;display:flex;gap:8px;}
.order-card img.proof{width:100%;border-radius:8px;margin-top:8px;}

.status-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.status-col h3{display:flex;align-items:center;gap:8px;}
.count{background:var(--accent);color:#fff;font-size:10.5px;border-radius:99px;padding:1px 8px;}

.empty{text-align:center;color:var(--muted);padding:28px 10px;font-size:13px;}
.empty svg{display:block;margin:0 auto 6px;width:26px;height:26px;}

.fab{position:fixed;bottom:18px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 6px 14px rgba(37,99,235,.35);z-index:25;display:flex;align-items:center;justify-content:center;}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;}
.stat .n{font-size:19px;font-weight:700;}
.stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}

.low{color:var(--warn);font-weight:700;}
.variance{color:var(--warn);font-weight:700;font-size:11px;}
.ok-variance{color:var(--ok);font-weight:700;font-size:11px;}

.sheet-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:none;align-items:flex-end;justify-content:center;}
.sheet-overlay.show{display:flex;}
.sheet{background:var(--bg);width:100%;max-width:560px;border-radius:14px 14px 0 0;padding:18px;max-height:88vh;overflow-y:auto;}
.sheet h2{font-size:17px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sheet-close{float:right;background:none;border:none;color:var(--muted);display:flex;}

.chart-wrap{position:relative;height:200px;}

.receipt{background:#fff;border:1px dashed #c9ccd1;border-radius:8px;padding:16px;font-family:'Courier New',monospace;font-size:12.5px;}
.receipt .rhead{text-align:center;margin-bottom:10px;}
.receipt .rhead b{font-size:14px;}
.receipt hr{border:none;border-top:1px dashed #c9ccd1;margin:8px 0;}
.receipt .rline{display:flex;justify-content:space-between;}
.receipt .rtotal{display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:6px;}

table.txn{width:100%;border-collapse:collapse;font-size:12.5px;}
table.txn th{text-align:left;padding:8px 10px;background:var(--bg);color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);}
table.txn td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
table.txn tr:hover td{background:#fafbfc;}

.three-split{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.three-split h3{display:flex;align-items:center;gap:6px;}

.photo-input-wrap{border:1.5px dashed var(--line);border-radius:8px;padding:14px;text-align:center;color:var(--muted);font-size:12.5px;}
.photo-input-wrap img{max-width:100%;border-radius:8px;margin-top:8px;}

@media(max-width:900px){
  .order-builder{grid-template-columns:1fr;}
  .order-right{position:static;}
  .three-split{grid-template-columns:1fr;}
}
@media(max-width:760px){
  .sidebar{width:100%;height:auto;position:fixed;top:auto;bottom:0;left:0;right:0;flex-direction:row;align-items:center;}
  .sidebar .brand,.sidebar .clock,.sidebar .userbox{display:none;}
  .sidebar nav{flex-direction:row;width:100%;padding:6px 4px;}
  .sidebar nav button{flex:1;flex-direction:column;gap:2px;font-size:10px;padding:7px 2px;text-align:center;justify-content:center;}
  .content{margin-left:0;padding:14px 14px 80px;}
  .stat-grid,.cols-2,.cols-3,.cols-4,.status-cols{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">Y</div>
    <h1>Yan's Foodhouz</h1>
    <p>Sign in to continue</p>
    <div class="role-grid" id="roleTiles">
      <button class="role-tile selected" data-role="cashier"></button>
      <button class="role-tile" data-role="rider"></button>
    </div>
    <div class="field" style="text-align:left;">
      <label>Your name</label>
      <input type="text" id="loginName" placeholder="e.g. Maria">
    </div>
    <button class="btn btn-primary" id="loginBtn">Log in</button>
  </div>
</div>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="logo">Y</div>
      <div><h1>Yan's Foodhouz</h1><small>Ulam &amp; Pulutan</small></div>
    </div>
    <nav id="tabs"></nav>
    <div class="userbox">
      <div class="who" id="ubName">—</div>
      <div class="role" id="ubRole">—</div>
      <button id="logoutBtn"></button>
    </div>
    <div class="clock">
      <div class="t" id="sidebarClock">--:--</div>
      <div id="sidebarDate">-</div>
    </div>
  </aside>

  <div class="content">

    <!-- ===== CASHIER: ORDERS ===== -->
    <section class="view-section" id="view-orders">
      <div class="content-head"><h2 id="ordersHeading"></h2></div>
      <div class="subtabs" id="orderSubtabs">
        <button data-sub="new" class="active"></button>
        <button data-sub="queue"></button>
        <button data-sub="history"></button>
      </div>

      <!-- New Order: two columns -->
      <div class="subpanel active" id="sub-new">
        <div class="order-builder">
          <div class="order-left">
            <div class="field">
              <label>Order type</label>
              <div class="tile-grid cols3" id="typeTiles"></div>
            </div>
            <div class="field" id="riderField" style="display:none;">
              <label>Assign delivery rider</label>
              <div class="tile-grid" id="riderTiles"></div>
              <div class="hint" id="riderHint"></div>
            </div>
            <div class="field" id="addressField" style="display:none;">
              <label>Customer address</label>
              <input type="text" id="deliveryAddress" placeholder="Search or type address...">
              <button class="btn btn-ghost btn-sm" id="pinLocationBtn" style="margin-top:8px;width:100%;"></button>
              <div class="hint" id="distanceHint"></div>
            </div>
            <div class="field">
              <label>Menu</label>
              <div class="tile-grid" id="orderMenuGrid"></div>
            </div>
          </div>
          <div class="order-right">
            <div class="card" id="cartCard">
              <h3 id="cartHeading"></h3>
              <div id="cartRows"></div>
              <div class="cart-total"><span>Total</span><span id="cartTotal">₱0</span></div>
              <div class="field" style="margin-top:14px;">
                <label>Payment method</label>
                <div class="tile-grid" id="payTiles"></div>
              </div>
              <div class="field" id="gcashRefField" style="display:none;">
                <label>GCash reference no.</label>
                <input type="text" id="gcashRefInput" placeholder="e.g. 1234567890123">
              </div>
              <button class="btn btn-primary" id="confirmOrderBtn" style="margin-top:6px;">Place Order — <span id="confirmTotal">₱0</span></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Queue: two columns -->
      <div class="subpanel" id="sub-queue">
        <div class="status-cols">
          <div><h3 id="queuedHeading"><span class="count" id="queuedCount">0</span></h3><div id="queuedList"></div></div>
          <div><h3 id="servedHeading"><span class="count" id="servedCount">0</span></h3><div id="servedList"></div></div>
        </div>
      </div>

      <!-- History: 3-way split by order type -->
      <div class="subpanel" id="sub-history">
        <div class="content-head">
          <div></div>
          <div class="date-nav" id="histDateNav">
            <button data-act="prev"></button><span class="lbl" id="histDateLbl">Today</span><button data-act="next"></button>
          </div>
        </div>
        <div class="three-split">
          <div><h3 id="histDineHead"></h3><div id="histDineList"></div></div>
          <div><h3 id="histPickupHead"></h3><div id="histPickupList"></div></div>
          <div><h3 id="histDeliveryHead"></h3><div id="histDeliveryList"></div></div>
        </div>
      </div>
    </section>

    <!-- ===== CASHIER: INVENTORY ===== -->
    <section class="view-section" id="view-inventory" style="display:none;">
      <div class="content-head">
        <h2 id="invHeading"></h2>
        <div class="date-nav" id="invDateNav"><button data-act="prev"></button><span class="lbl" id="invDateLbl">Today</span><button data-act="next"></button></div>
      </div>
      <div class="search-row">
        <input type="text" id="invSearch" placeholder="Search ingredient...">
        <button class="icon-btn" id="addInvBtn"></button>
      </div>
      <div class="card">
        <div class="hint" id="invNote" style="margin-bottom:10px;"></div>
        <button class="btn btn-ghost" id="endDayBtn" style="margin-bottom:10px;"></button>
        <div class="grid-row cols-2" id="invList"></div>
      </div>
    </section>

    <!-- ===== CASHIER: GCASH ===== -->
    <section class="view-section" id="view-payments" style="display:none;">
      <div class="content-head">
        <h2 id="gcashHeading"></h2>
        <div class="date-nav" id="gcashDateNav"><button data-act="prev"></button><span class="lbl" id="gcashDateLbl">Today</span><button data-act="next"></button></div>
      </div>
      <div class="grid-row cols-3" id="gcashList"></div>
    </section>

    <!-- ===== CASHIER: SALES = TRANSACTIONS TABLE + EXPORT ===== -->
    <section class="view-section" id="view-sales" style="display:none;">
      <div class="content-head"><h2 id="salesHeading"></h2></div>

      <div class="stat-grid" id="statGrid"></div>

      <div class="grid-row cols-2" style="margin-top:14px;">
        <div class="card"><h3 id="revHeading"></h3><div class="chart-wrap"><canvas id="revChart"></canvas></div></div>
        <div class="card"><h3 id="bestHeading"></h3><div class="chart-wrap"><canvas id="bestChart"></canvas></div></div>
      </div>

      <div class="card" style="margin-top:14px;">
        <div class="content-head" style="margin-bottom:10px;">
          <h3 id="txnHeading" style="margin:0;"></h3>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <div class="date-range">
              <input type="date" id="txnFrom"><span style="color:var(--muted);font-size:12px;">to</span><input type="date" id="txnTo">
            </div>
            <button class="btn btn-primary btn-sm" id="exportBtn"></button>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="txn" id="txnTable"></table>
        </div>
      </div>
    </section>

    <!-- ===== CASHIER: MENU ===== -->
    <section class="view-section" id="view-menu" style="display:none;">
      <div class="content-head"><h2 id="menuHeading"></h2></div>
      <div class="search-row">
        <input type="text" id="menuSearch" placeholder="Search menu...">
        <button class="icon-btn" id="addMenuBtn"></button>
      </div>
      <div class="grid-row cols-3" id="menuMgmtList"></div>
    </section>

    <!-- ===== RIDER: QUEUE / ACCEPTING ===== -->
    <section class="view-section" id="view-riderQueue" style="display:none;">
      <div class="content-head"><h2 id="riderQueueHeading"></h2></div>
      <div class="hint" style="margin-bottom:12px;" id="riderQueueNote"></div>
      <div class="grid-row cols-3" id="riderQueueList"></div>
    </section>

    <!-- ===== RIDER: PROOF OF DELIVERY ===== -->
    <section class="view-section" id="view-riderProof" style="display:none;">
      <div class="content-head"><h2 id="riderProofHeading"></h2></div>
      <div class="grid-row cols-3" id="riderProofList"></div>
    </section>

    <!-- ===== RIDER: HISTORY ===== -->
    <section class="view-section" id="view-riderHistory" style="display:none;">
      <div class="content-head"><h2 id="riderHistoryHeading"></h2></div>
      <div class="grid-row cols-3" id="riderHistoryList"></div>
    </section>

  </div>
</div>

<button class="fab" id="newOrderFab" title="New order"></button>

<!-- Add inventory sheet -->
<div class="sheet-overlay" id="invSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="invSheetOverlay"></button>
    <h2 id="invSheetTitle"></h2>
    <input type="hidden" id="invEditId">
    <div class="field"><label>Name</label><input type="text" id="invName" placeholder="e.g. Pork Belly"></div>
    <div class="row2">
      <div class="field"><label>Qty on hand (estimate)</label><input type="number" id="invQty" placeholder="0"></div>
      <div class="field"><label>Unit</label><input type="text" id="invUnit" placeholder="kg / pcs / L"></div>
    </div>
    <div class="field"><label>Low-stock alert below</label><input type="number" id="invLow" placeholder="0"></div>
    <button class="btn btn-primary" id="saveInvBtn"></button>
    <button class="btn btn-danger" id="deleteInvBtn" style="margin-top:8px;display:none;"></button>
  </div>
</div>

<!-- Verify stock sheet -->
<div class="sheet-overlay" id="verifySheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="verifySheetOverlay"></button>
    <h2 id="verifyTitle"></h2>
    <input type="hidden" id="verifyId">
    <p id="verifyEstLine" style="font-size:13px;color:var(--ink-soft);"></p>
    <div class="field"><label>Actual count on hand</label><input type="number" id="verifyActual" placeholder="0"></div>
    <button class="btn btn-primary" id="saveVerifyBtn"></button>
  </div>
</div>

<!-- Add menu item sheet -->
<div class="sheet-overlay" id="menuSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="menuSheetOverlay"></button>
    <h2 id="menuSheetTitle"></h2>
    <input type="hidden" id="menuEditId">
    <div class="field"><label>Name</label><input type="text" id="menuName" placeholder="e.g. Sisig"></div>
    <div class="row2">
      <div class="field"><label>Price (₱)</label><input type="number" id="menuPrice" placeholder="0"></div>
      <div class="field"><label>Category</label><input type="text" id="menuCat" placeholder="Ulam / Pulutan"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Uses ingredient</label><select id="menuRecipeIng"><option value="">— none —</option></select></div>
      <div class="field"><label>Qty used per order</label><input type="number" step="0.01" id="menuRecipeQty" placeholder="0"></div>
    </div>
    <button class="btn btn-primary" id="saveMenuBtn"></button>
    <button class="btn btn-danger" id="deleteMenuBtn" style="margin-top:8px;display:none;"></button>
  </div>
</div>

<!-- Receipt sheet -->
<div class="sheet-overlay" id="receiptSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="receiptSheetOverlay"></button>
    <h2 id="receiptTitle"></h2>
    <div class="receipt" id="receiptBody"></div>
  </div>
</div>

<!-- Proof upload sheet -->
<div class="sheet-overlay" id="proofSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="proofSheetOverlay"></button>
    <h2 id="proofSheetTitle"></h2>
    <input type="hidden" id="proofOrderId">
    <div class="photo-input-wrap" id="photoWrap">
      <input type="file" id="proofPhotoInput" accept="image/*" capture="environment" style="margin-top:8px;">
      <div id="photoPreviewWrap"></div>
    </div>
    <button class="btn btn-primary" id="saveProofBtn" style="margin-top:14px;"></button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
