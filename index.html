<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Yan's POS">
<meta name="theme-color" content="#c0392b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Yan's Foodhouz POS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --red: #c0392b;
    --red-dark: #96281b;
    --red-light: #e74c3c;
    --orange: #e67e22;
    --yellow: #f1c40f;
    --green: #27ae60;
    --blue: #2980b9;
    --gray-100: #f8f9fa;
    --gray-200: #e9ecef;
    --gray-300: #dee2e6;
    --gray-400: #ced4da;
    --gray-500: #adb5bd;
    --gray-600: #6c757d;
    --gray-700: #495057;
    --gray-800: #343a40;
    --gray-900: #212529;
    --sidebar-w: 220px;
    --sidebar-collapsed: 64px;
    --white: #ffffff;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-900); display: flex; height: 100dvh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--red-dark); color: white;
    display: flex; flex-direction: column;
    transition: width 0.2s; overflow: hidden; z-index: 100;
    flex-shrink: 0;
  }
  .sidebar.collapsed { width: var(--sidebar-collapsed); min-width: var(--sidebar-collapsed); }
  .sidebar-brand {
    padding: 16px 12px; display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1);
    min-height: 64px;
  }
  .brand-logo { width: 36px; height: 36px; background: var(--red-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0; }
  .brand-text { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; }
  .brand-sub { font-size: 10px; opacity: 0.6; font-weight: 400; }
  .sidebar-toggle { margin-left: auto; background: none; border: none; color: white; cursor: pointer; opacity: 0.7; flex-shrink: 0; padding: 4px; }
  .sidebar-toggle:hover { opacity: 1; }
  .sidebar-clock { padding: 10px 12px; font-size: 11px; opacity: 0.7; border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; overflow: hidden; }
  .clock-time { font-size: 18px; font-weight: 700; opacity: 1; letter-spacing: 1px; }
  .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 16px;
    cursor: pointer; color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 500;
    transition: all 0.15s; white-space: nowrap; overflow: hidden; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: white; }
  .nav-item i { width: 18px; text-align: center; flex-shrink: 0; font-size: 15px; }
  .nav-label { overflow: hidden; }
  .sidebar-user { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .user-info { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(0,0,0,0.15); border-radius: var(--radius); cursor: pointer; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--red-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; }
  .user-role { font-size: 10px; opacity: 0.6; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: var(--shadow); }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--gray-800); }
  .topbar-badge { background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
  .topbar-spacer { flex: 1; }
  .topbar-date { font-size: 12px; color: var(--gray-500); }

  .content { flex: 1; overflow-y: auto; padding: 20px; }

  /* TABS */
  .tab-bar { display: flex; gap: 2px; background: var(--gray-200); border-radius: var(--radius); padding: 3px; margin-bottom: 16px; }
  .tab-btn { flex: 1; padding: 7px 10px; border: none; background: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--gray-600); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .tab-btn.active { background: white; color: var(--red); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .tab-btn i { font-size: 12px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CARDS */
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--gray-800); }

  /* BUTTONS */
  .btn { padding: 8px 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #1e8449; }
  .btn-outline { background: white; border: 1px solid var(--gray-300); color: var(--gray-700); }
  .btn-outline:hover { background: var(--gray-100); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-warning { background: var(--orange); color: white; }
  .btn-blue { background: var(--blue); color: white; }

  /* STATUS BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .badge-queued { background: #fff3cd; color: #856404; }
  .badge-served { background: #d1e7dd; color: #0f5132; }
  .badge-delivery { background: #cfe2ff; color: #084298; }
  .badge-pickup { background: #e2d9f3; color: #41337a; }
  .badge-dinein { background: #fde8d8; color: #842029; }
  .badge-cancelled { background: var(--gray-200); color: var(--gray-600); }
  .badge-pending { background: #fff3cd; color: #856404; }
  .badge-confirmed { background: #d1e7dd; color: #0f5132; }

  /* SEARCH + INPUT */
  .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .search-input { flex: 1; padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; }
  .search-input:focus { outline: none; border-color: var(--red); }

  /* ======================== LOGIN ======================== */
  #loginScreen {
    position: fixed; inset: 0; background: var(--red-dark);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .login-box { background: white; border-radius: 16px; padding: 40px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
  .login-logo { width: 64px; height: 64px; background: var(--red); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: white; margin: 0 auto 12px; }
  .login-title { font-size: 20px; font-weight: 800; color: var(--gray-900); }
  .login-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 24px; }
  .login-input { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 10px; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .role-btn { padding: 14px 10px; border: 2px solid var(--gray-200); border-radius: var(--radius); background: white; cursor: pointer; transition: all 0.15s; }
  .role-btn.selected { border-color: var(--red); background: #fff5f5; }
  .role-btn i { font-size: 22px; color: var(--red); display: block; margin-bottom: 6px; }
  .role-btn span { font-size: 12px; font-weight: 600; color: var(--gray-700); }

  /* ======================== ORDERS ======================== */
  .order-layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; height: calc(100vh - 180px); }
  .menu-section { display: flex; flex-direction: column; overflow: hidden; }
  .menu-categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .cat-btn { padding: 5px 12px; border: 1px solid var(--gray-300); border-radius: 20px; background: white; cursor: pointer; font-size: 11px; font-weight: 500; color: var(--gray-600); transition: all 0.15s; }
  .cat-btn.active { background: var(--red); border-color: var(--red); color: white; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; overflow-y: auto; flex: 1; padding-right: 4px; }
  .menu-tile {
    background: white; border: 1px solid var(--gray-200); border-radius: var(--radius);
    padding: 12px 8px; cursor: pointer; text-align: center; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .menu-tile:hover { border-color: var(--red); box-shadow: 0 2px 8px rgba(192,57,43,0.15); transform: translateY(-1px); }
  .menu-tile.out-of-stock { opacity: 0.5; cursor: not-allowed; }
  .tile-icon { font-size: 24px; }
  .tile-name { font-size: 11px; font-weight: 600; color: var(--gray-800); line-height: 1.2; }
  .tile-price { font-size: 13px; font-weight: 700; color: var(--red); }
  .tile-stock { font-size: 10px; color: var(--gray-500); }

  /* CART */
  .cart-panel { background: white; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
  .cart-header { padding: 12px 16px; border-bottom: 1px solid var(--gray-200); }
  .cart-header-title { font-size: 14px; font-weight: 700; }
  .order-type-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .type-btn { flex: 1; padding: 7px 8px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); background: white; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--gray-600); transition: all 0.15s; text-align: center; min-width: 60px; }
  .type-btn.active { background: var(--red); border-color: var(--red); color: white; }
  .cart-body { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .cart-empty { text-align: center; padding: 40px 20px; color: var(--gray-400); }
  .cart-empty i { font-size: 36px; display: block; margin-bottom: 8px; }
  .cart-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
  .cart-item-name { flex: 1; font-size: 12px; font-weight: 500; }
  .cart-qty { display: flex; align-items: center; gap: 4px; }
  .qty-btn { width: 22px; height: 22px; border: 1px solid var(--gray-300); background: white; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: var(--gray-100); }
  .cart-item-price { font-size: 12px; font-weight: 700; color: var(--red); min-width: 55px; text-align: right; }
  .cart-footer { padding: 12px; border-top: 1px solid var(--gray-200); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cart-total-label { font-size: 13px; color: var(--gray-600); }
  .cart-total-amount { font-size: 20px; font-weight: 800; color: var(--red); }

  /* RIDER SELECTOR */
  .rider-select-row { margin-top: 8px; }
  .rider-select { width: 100%; padding: 8px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 12px; }
  .delivery-address { margin-top: 6px; }
  .delivery-address input { width: 100%; padding: 8px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 4px; }

  /* PAYMENT */
  .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
  .pay-btn { padding: 8px; border: 1px solid var(--gray-300); background: white; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; font-weight: 600; color: var(--gray-600); text-align: center; transition: all 0.15s; }
  .pay-btn.active { background: var(--green); border-color: var(--green); color: white; }
  .gcash-ref-input { width: 100%; padding: 7px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 12px; margin-top: 6px; }

  /* QUEUE */
  .queue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .queue-col-header { font-size: 12px; font-weight: 700; color: var(--gray-600); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .queue-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--gray-300); }
  .queue-card.queued { border-left-color: var(--orange); }
  .queue-card.served { border-left-color: var(--green); opacity: 0.8; }
  .queue-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .queue-order-no { font-size: 14px; font-weight: 800; color: var(--gray-900); }
  .queue-items { font-size: 11px; color: var(--gray-600); margin-bottom: 6px; line-height: 1.6; }
  .queue-footer { display: flex; justify-content: space-between; align-items: center; }
  .queue-total { font-size: 12px; font-weight: 700; color: var(--red); }
  .queue-time { font-size: 10px; color: var(--gray-400); }

  /* HISTORY */
  .history-filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .history-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--gray-100); padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 700; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  tr:hover td { background: var(--gray-50, #fafafa); }

  /* INVENTORY */
  .inventory-date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .date-nav-btn { background: white; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; font-size: 13px; }
  .date-nav-label { font-size: 13px; font-weight: 600; color: var(--gray-800); flex: 1; text-align: center; }
  .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .inv-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
  .inv-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .inv-unit { font-size: 10px; color: var(--gray-500); margin-bottom: 8px; }
  .inv-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .inv-label { font-size: 11px; color: var(--gray-500); }
  .inv-value { font-size: 12px; font-weight: 600; }
  .inv-value.low { color: #e74c3c; }
  .inv-value.ok { color: var(--green); }
  .inv-verify { width: 100%; margin-top: 8px; padding: 5px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 11px; }
  .inv-verify-btn { width: 100%; margin-top: 4px; padding: 5px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 11px; cursor: pointer; }
  .mismatch { background: #fff5f5; border-color: var(--red); }

  /* GCASH */
  .gcash-list { display: flex; flex-direction: column; gap: 8px; }
  .gcash-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px; display: flex; align-items: center; gap: 12px; }
  .gcash-icon { width: 36px; height: 36px; background: #0075cc; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; flex-shrink: 0; }
  .gcash-info { flex: 1; }
  .gcash-ref { font-size: 13px; font-weight: 700; }
  .gcash-meta { font-size: 11px; color: var(--gray-500); }
  .gcash-amount { font-size: 14px; font-weight: 800; color: var(--green); }

  /* DASHBOARD */
  .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .stat-label { font-size: 11px; color: var(--gray-500); font-weight: 600; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 800; color: var(--gray-900); }
  .stat-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .chart-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }

  /* TRANSACTIONS */
  .tx-header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

  /* DELIVERY RIDER VIEW */
  .rider-queue-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--blue); }
  .rider-queue-card.accepted { border-left-color: var(--orange); }
  .rider-queue-card.on-way { border-left-color: var(--yellow); }
  .rider-queue-card.delivered { border-left-color: var(--green); }
  .proof-section { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
  .photo-thumb { aspect-ratio: 1; background: var(--gray-100); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; border: 2px dashed var(--gray-300); overflow: hidden; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* DATE NAV */
  .date-nav { display: flex; align-items: center; gap: 8px; }
  .date-nav button { background: white; border: 1px solid var(--gray-300); padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer; }
  .date-nav span { font-size: 13px; font-weight: 600; min-width: 100px; text-align: center; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: white; border-radius: 12px; padding: 24px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-500); }
  .receipt { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; background: var(--gray-100); padding: 16px; border-radius: var(--radius-sm); }
  .receipt-center { text-align: center; }
  .receipt-divider { border-top: 1px dashed var(--gray-400); margin: 6px 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-900); color: white; padding: 10px 16px; border-radius: var(--radius); font-size: 12px; z-index: 9999; animation: slideIn 0.3s ease; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ADD INGREDIENT MODAL */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--red); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .bottom-nav { display: flex; }
    .order-layout { grid-template-columns: 1fr; height: auto; }
    .cart-panel { height: auto; }
    .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
    .queue-grid { grid-template-columns: 1fr; }
  }
  .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--gray-200); z-index: 100; }
  .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; cursor: pointer; color: var(--gray-500); font-size: 10px; gap: 2px; border: none; background: none; }
  .bottom-nav-item.active { color: var(--red); }
  .bottom-nav-item i { font-size: 18px; }

  /* MISC */
  .section-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .map-placeholder { background: var(--gray-100); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--gray-400); border: 2px dashed var(--gray-300); margin-top: 8px; }
  .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input[type="date"] { padding: 6px 10px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 12px; }
  select { padding: 6px 10px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 12px; background: white; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Y</div>
    <div class="login-title">Yan's Foodhouz</div>
    <div class="login-sub">Sign in to continue</div>
    <input class="login-input" id="loginName" type="text" placeholder="Your name" maxlength="30">
    <div class="section-label" style="text-align:left; margin-bottom:8px;">Select Role</div>
    <div class="role-grid">
      <button class="role-btn selected" onclick="selectRole('cashier',this)">
        <i class="fa fa-cash-register"></i>
        <span>Cashier</span>
      </button>
      <button class="role-btn" onclick="selectRole('rider',this)">
        <i class="fa fa-motorcycle"></i>
        <span>Delivery Rider</span>
      </button>
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;" onclick="doLogin()">
      <i class="fa fa-sign-in-alt"></i> Sign In
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">Y</div>
    <div class="brand-text">
      Yan's Foodhouz
      <div class="brand-sub">POS System</div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
  </div>
  <div class="sidebar-clock">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div id="clockDate">---</div>
  </div>
  <div class="sidebar-nav" id="sidebarNav">
    <!-- filled by JS based on role -->
  </div>
  <div class="sidebar-user">
    <div class="user-info" onclick="doLogout()">
      <div class="user-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-name" id="userName">Guest</div>
        <div class="user-role" id="userRoleLabel">Sign out</div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Dashboard</div>
    <span class="topbar-badge" id="queueBadge" style="display:none">0</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-date" id="topbarDate"></div>
  </div>
  <div class="content" id="mainContent">
    <!-- dynamic content -->
  </div>
</div>

<!-- BOTTOM NAV (mobile) -->
<div class="bottom-nav" id="bottomNav"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
