<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Yan's Foodhouz POS</title>
<meta name="theme-color" content="#7a2e1d" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --char: #2a1810;
  --ember: #c4502b;
  --ember-dark: #7a2e1d;
  --lard: #f4ead9;
  --paper: #fffaf2;
  --leaf: #5c7a4f;
  --line: #e3d4ba;
  --warn: #b8331f;
  --gold: #d49a3a;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--lard);color:var(--char);}
h1,h2,h3{font-family:'DM Serif Display', Georgia, serif; margin:0;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* ===== App shell: sidebar + content ===== */
.app{display:flex;min-height:100vh;}

.sidebar{
  width:208px;flex-shrink:0;
  background:var(--ember-dark);color:var(--paper);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:30;
}
.sidebar .brand{padding:20px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.12);}
.sidebar .brand .flame{font-size:22px;}
.sidebar .brand h1{font-size:16px;line-height:1.2;}
.sidebar .brand small{display:block;font-size:9.5px;opacity:.7;letter-spacing:1.3px;text-transform:uppercase;font-family:Inter,sans-serif;}
.sidebar nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:3px;}
.sidebar nav button{
  display:flex;align-items:center;gap:10px;
  background:none;border:none;color:rgba(255,255,255,.78);
  padding:11px 12px;border-radius:8px;font-size:13.5px;font-weight:600;text-align:left;
}
.sidebar nav button .ic{font-size:16px;width:20px;text-align:center;}
.sidebar nav button.active{background:rgba(255,255,255,.14);color:#fff;}
.sidebar .clock{padding:14px 16px;border-top:1px solid rgba(255,255,255,.12);font-size:11.5px;opacity:.85;}
.sidebar .clock .t{font-size:16px;font-weight:700;font-family:'DM Serif Display',serif;}

.content{flex:1;margin-left:208px;padding:18px 22px 90px;min-width:0;}

.content-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.content-head h2{font-size:21px;color:var(--ember-dark);}

/* date nav (Inventory / GCash / Sales) */
.date-nav{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 8px;}
.date-nav button{background:none;border:none;font-size:15px;color:var(--ember-dark);width:26px;height:26px;border-radius:6px;}
.date-nav button:active{background:var(--lard);}
.date-nav .lbl{font-size:13px;font-weight:700;min-width:108px;text-align:center;}

.search-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.search-row input[type=text]{flex:1;margin-top:0;}
.icon-btn{
  width:38px;height:38px;border-radius:8px;border:1px solid var(--line);
  background:var(--ember);color:#fff;font-size:18px;font-weight:700;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}

.grid-row{display:grid;gap:12px;}
.cols-2{grid-template-columns:repeat(2,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}

.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px;
  margin-bottom:12px;
}
.card h3{font-size:15px;color:var(--ember-dark);margin-bottom:8px;}

/* Tile buttons (used for source, payment, menu) */
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.tile{
  border:2px solid var(--line);background:var(--paper);
  border-radius:8px;padding:10px;text-align:left;
}
.tile.selected{border-color:var(--ember);background:#fdf0e6;}
.tile .nm{font-weight:700;font-size:13.5px;display:block;}
.tile .pr{font-size:12px;color:var(--ember);font-weight:600;}

.cart-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px dashed var(--line);
  font-size:13.5px;
}
.cart-row .nm{flex:1;}
.qty-btn{
  width:26px;height:26px;border-radius:6px;border:1px solid var(--line);
  background:var(--lard);font-weight:700;
}
.cart-total{
  display:flex;justify-content:space-between;font-size:16px;font-weight:700;
  padding-top:10px;color:var(--ember-dark);
}

select,input[type=text],input[type=number],input[type=date]{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;
  background:var(--paper);font-size:13.5px;margin-top:4px;
}
label{font-size:12px;font-weight:600;color:#8a7256;text-transform:uppercase;letter-spacing:.4px;}
.field{margin-bottom:10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.btn{
  display:block;width:100%;text-align:center;padding:12px;border-radius:8px;
  border:none;font-weight:700;font-size:14px;
}
.btn-primary{background:var(--ember);color:#fff;}
.btn-primary:active{background:var(--ember-dark);}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--ember-dark);}
.btn-danger{background:none;color:var(--warn);border:1px solid #e3b3aa;}
.btn-sm{padding:7px 10px;font-size:12.5px;width:auto;display:inline-block;}

.badge{
  display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;
  border-radius:99px;text-transform:uppercase;letter-spacing:.4px;
}
.b-walkin{background:#e4ecda;color:var(--leaf);}
.b-grab{background:#e8f0ff;color:#2a5db0;}
.b-panda{background:#ffe6ee;color:#c23566;}
.b-pickup{background:#fff3da;color:var(--gold);}
.b-paid{background:#e4ecda;color:var(--leaf);}
.b-pending{background:#fde7d8;color:var(--ember-dark);}
.b-queued{background:#fde7d8;color:var(--ember-dark);}
.b-served{background:#e4ecda;color:var(--leaf);}

.order-card{position:relative;}
.order-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.order-card .items{font-size:13px;color:#5a4a38;margin:6px 0;}
.order-card .meta{font-size:11.5px;color:#9a8868;}
.order-card .total{font-weight:700;color:var(--ember-dark);font-size:15px;}
.order-card .actions{margin-top:10px;display:flex;gap:8px;}

.empty{
  text-align:center;color:#a9967a;padding:30px 10px;font-size:13.5px;
}
.empty .ico{font-size:30px;display:block;margin-bottom:6px;}

.fab{
  position:fixed;bottom:18px;right:18px;
  width:56px;height:56px;border-radius:50%;
  background:var(--ember);color:#fff;border:none;
  font-size:26px;box-shadow:0 6px 14px rgba(196,80,43,.4);
  z-index:25;
}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;}
.stat .n{font-size:22px;font-weight:700;color:var(--ember-dark);font-family:'DM Serif Display',serif;}
.stat .l{font-size:11px;color:#9a8868;text-transform:uppercase;letter-spacing:.5px;}

.low{color:var(--warn);font-weight:700;}

.sheet-overlay{
  position:fixed;inset:0;background:rgba(42,24,16,.45);z-index:40;
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-overlay.show{display:flex;}
.sheet{
  background:var(--lard);width:100%;max-width:560px;
  border-radius:16px 16px 0 0;padding:18px;max-height:88vh;overflow-y:auto;
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet h2{font-size:19px;margin-bottom:12px;color:var(--ember-dark);}
.sheet-close{float:right;background:none;border:none;font-size:20px;color:#9a8868;}

.chart-wrap{position:relative;height:220px;}

/* ===== Responsive: collapse sidebar to bottom bar on narrow screens ===== */
@media(max-width:760px){
  .sidebar{
    width:100%;height:auto;position:fixed;top:auto;bottom:0;left:0;right:0;
    flex-direction:row;align-items:center;
  }
  .sidebar .brand,.sidebar .clock{display:none;}
  .sidebar nav{flex-direction:row;width:100%;padding:6px 4px;}
  .sidebar nav button{flex:1;flex-direction:column;gap:2px;font-size:10.5px;padding:7px 2px;text-align:center;}
  .sidebar nav button .ic{font-size:18px;}
  .content{margin-left:0;padding:14px 14px 80px;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .cols-2,.cols-3,.cols-4{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <span class="flame">🔥</span>
      <div>
        <h1>Yan's Foodhouz</h1>
        <small>Ulam &amp; Pulutan</small>
      </div>
    </div>
    <nav id="tabs">
      <button data-view="orders" class="active"><span class="ic">📋</span>Orders</button>
      <button data-view="inventory"><span class="ic">📦</span>Inventory</button>
      <button data-view="payments"><span class="ic">💳</span>GCash</button>
      <button data-view="sales"><span class="ic">📊</span>Sales</button>
      <button data-view="menu"><span class="ic">🍲</span>Menu</button>
    </nav>
    <div class="clock">
      <div class="t" id="sidebarClock">--:--</div>
      <div id="sidebarDate">-</div>
    </div>
  </aside>

  <div class="content">

    <!-- ORDERS VIEW -->
    <section class="view-section" id="view-orders">
      <div class="content-head">
        <h2>Today's Queue</h2>
      </div>
      <div class="grid-row cols-3" id="orderList"></div>
    </section>

    <!-- INVENTORY VIEW -->
    <section class="view-section" id="view-inventory" style="display:none;">
      <div class="content-head">
        <h2>Inventory</h2>
        <div class="date-nav" id="invDateNav">
          <button data-act="prev">‹</button>
          <span class="lbl" id="invDateLbl">Today</span>
          <button data-act="next">›</button>
        </div>
      </div>
      <div class="search-row">
        <input type="text" id="invSearch" placeholder="Search ingredient...">
        <button class="icon-btn" id="addInvBtn">+</button>
      </div>
      <div class="card">
        <button class="btn btn-ghost" id="endDayBtn" style="margin-bottom:10px;">End shift → carry stock to next day</button>
        <div class="grid-row cols-2" id="invList"></div>
      </div>
    </section>

    <!-- PAYMENTS VIEW -->
    <section class="view-section" id="view-payments" style="display:none;">
      <div class="content-head">
        <h2>GCash Confirmations</h2>
        <div class="date-nav" id="gcashDateNav">
          <button data-act="prev">‹</button>
          <span class="lbl" id="gcashDateLbl">Today</span>
          <button data-act="next">›</button>
        </div>
      </div>
      <div class="grid-row cols-3" id="gcashList"></div>
    </section>

    <!-- SALES VIEW -->
    <section class="view-section" id="view-sales" style="display:none;">
      <div class="content-head">
        <h2>Sales Summary</h2>
        <div class="date-nav" id="salesDateNav">
          <button data-act="prev">‹</button>
          <span class="lbl" id="salesDateLbl">Today</span>
          <button data-act="next">›</button>
        </div>
      </div>
      <div class="stat-grid" id="statGrid"></div>
      <div class="grid-row cols-2" style="margin-top:14px;">
        <div class="card">
          <h3>Yesterday vs Today — Revenue</h3>
          <div class="chart-wrap"><canvas id="revChart"></canvas></div>
        </div>
        <div class="card">
          <h3>Best Sellers (selected day)</h3>
          <div class="chart-wrap"><canvas id="bestChart"></canvas></div>
        </div>
      </div>
    </section>

    <!-- MENU VIEW -->
    <section class="view-section" id="view-menu" style="display:none;">
      <div class="content-head">
        <h2>Menu Items</h2>
      </div>
      <div class="search-row">
        <input type="text" id="menuSearch" placeholder="Search menu...">
        <button class="icon-btn" id="addMenuBtn">+</button>
      </div>
      <div class="grid-row cols-3" id="menuMgmtList"></div>
    </section>

  </div>
</div>

<button class="fab" id="newOrderFab" title="New order">+</button>

<!-- New Order Sheet -->
<div class="sheet-overlay" id="orderSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="orderSheetOverlay">✕</button>
    <h2>New Order</h2>

    <div class="field">
      <label>Source</label>
      <div class="tile-grid" id="sourceTiles"></div>
    </div>

    <div class="field">
      <label>Menu</label>
      <div class="tile-grid" id="orderMenuGrid"></div>
    </div>

    <div class="card" id="cartCard">
      <h3>Cart</h3>
      <div id="cartRows"></div>
      <div class="cart-total"><span>Total</span><span id="cartTotal">₱0</span></div>
    </div>

    <div class="field">
      <label>Payment method</label>
      <div class="tile-grid" id="payTiles"></div>
    </div>

    <div class="field" id="gcashRefField" style="display:none;">
      <label>GCash reference no.</label>
      <input type="text" id="gcashRefInput" placeholder="e.g. 1234567890123">
    </div>

    <button class="btn btn-primary" id="confirmOrderBtn">Place Order — <span id="confirmTotal">₱0</span></button>
  </div>
</div>

<!-- Add inventory sheet -->
<div class="sheet-overlay" id="invSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="invSheetOverlay">✕</button>
    <h2>Add / Edit Ingredient</h2>
    <input type="hidden" id="invEditId">
    <div class="field"><label>Name</label><input type="text" id="invName" placeholder="e.g. Pork Belly"></div>
    <div class="row2">
      <div class="field"><label>Qty on hand</label><input type="number" id="invQty" placeholder="0"></div>
      <div class="field"><label>Unit</label><input type="text" id="invUnit" placeholder="kg / pcs / L"></div>
    </div>
    <div class="field"><label>Low-stock alert below</label><input type="number" id="invLow" placeholder="0"></div>
    <button class="btn btn-primary" id="saveInvBtn">Save</button>
    <button class="btn btn-danger" id="deleteInvBtn" style="margin-top:8px;display:none;">Delete ingredient</button>
  </div>
</div>

<!-- Add menu item sheet -->
<div class="sheet-overlay" id="menuSheetOverlay">
  <div class="sheet">
    <button class="sheet-close" data-close="menuSheetOverlay">✕</button>
    <h2>Add / Edit Menu Item</h2>
    <input type="hidden" id="menuEditId">
    <div class="field"><label>Name</label><input type="text" id="menuName" placeholder="e.g. Sisig"></div>
    <div class="row2">
      <div class="field"><label>Price (₱)</label><input type="number" id="menuPrice" placeholder="0"></div>
      <div class="field"><label>Category</label><input type="text" id="menuCat" placeholder="Ulam / Pulutan"></div>
    </div>
    <button class="btn btn-primary" id="saveMenuBtn">Save</button>
    <button class="btn btn-danger" id="deleteMenuBtn" style="margin-top:8px;display:none;">Delete item</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
